<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8" />
     <style>
          body {
               font-family: "Source Sans Pro", sans-serif;
               margin: 0;
               padding: 0;
               display: flex;
               justify-content: center;
               align-items: center;
               height: 100vh;
               background-color: transparent;
          }

          button {
               background-color: #FF4B4B;
               color: white;
               border: none;
               padding: 0.5rem 1rem;
               border-radius: 0.5rem;
               font-size: 1rem;
               font-weight: 400;
               cursor: pointer;
          width: 100%;
          transition: background-color 0.2s;
     }
     button:hover { background-color: #FF3333; }
     button:active { background-color: #CC2929; }
     button:disabled { background-color: #FF4B4B80; cursor: not-allowed; }
</style>
</head>

<body>
     <button id="geo-btn">📍 Get Live Location</button>

     <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@^1.3.0/dist/streamlit.js"></script>
     
     <script>
          document.addEventListener("DOMContentLoaded", () => {

          const button = document.getElementById("geo-btn");

          function getLocation() {
               button.disabled = true;
               button.innerHTML = "Locating...";

               // Safety fallback timer
               setTimeout(() => {
                    if (button.disabled) {
                         button.disabled = false;
                         button.innerHTML = "📍 Retry Location";
                    }
               }, 6000);

               if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(success, error, {
                         enableHighAccuracy: true,
                         timeout: 5000,
                         maximumAge: 0
                    });
               } else {
                    sendError("Geolocation not supported.");
               }
          }

          button.addEventListener("click", getLocation);

          function success(position) {
               const data = {
                    coords: {
                         latitude: position.coords.latitude,
                         longitude: position.coords.longitude,
                         accuracy: position.coords.accuracy
                    }
               };
               Streamlit.setComponentValue(data);

               button.innerHTML = "📍 Location Found!";
               setTimeout(() => {
                    button.disabled = false;
                    button.innerHTML = "📍 Update Location";
               }, 1500);
          }

          function error(err) {
               let msg = "Unknown error";
               if (err.code === err.PERMISSION_DENIED) msg = "Permission denied.";
               else if (err.code === err.POSITION_UNAVAILABLE) msg = "Position unavailable.";
               else if (err.code === err.TIMEOUT) msg = "Request timed out.";

               sendError(msg);
          }

          function sendError(msg) {
               Streamlit.setComponentValue({ error: msg });
               button.disabled = false;
               button.innerHTML = "⚠️ Error";
               setTimeout(() => { button.innerHTML = "📍 Retry Location"; }, 2000);
          }

          // Streamlit Initialization
          Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, () => {
               Streamlit.setFrameHeight(50);
          });
          Streamlit.setComponentReady();
     });
     </script>
     </body>
</html>
